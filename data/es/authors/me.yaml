bio: "Soy una persona versátil, transdisciplinaria y apasionada, con una formación híbrida que combina lo técnico y lo sociológico: he trabajado como arquitecto, desarrollador de Drupal, gestor de proyectos, docente, investigador y científico de datos, realizando tareas de procesamiento y visualización de datos con R y trabajando con datos geoespaciales mediante QGIS.\n

Mis intereses de investigación se enmarcan en los estudios urbanos y, más concretamente, en las dinámicas de mercantilización que surgen de la interacción entre ciudades, tecnología y sociedad. Hasta la fecha, me he centrado en las desigualdades sociales y espaciales con el fin de hallar vías para lograr ciudades más sostenibles e igualitarias, mejorando así el bienestar de las personas.\n"
